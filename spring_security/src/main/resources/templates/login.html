<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SecureBank</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">
            <h1>🏦 SecureBank</h1>
            <p>Your trusted banking partner</p>
        </div>

        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account to continue</p>

        <div th:if="${param.error}" class="alert alert-error">
            ⚠️ Invalid email or password. Please try again.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            ✅ You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email Address</label>
                <input type="text" name="username"
                       placeholder="Enter your email" required/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password"
                       placeholder="Enter your password" required/>
            </div>

            <button type="submit" class="btn btn-primary">
                Sign In →
            </button>
        </form>

        <p style="text-align:center; margin-top:24px; font-size:14px; color:#5f6368;">
            Don't have an account?
            <a href="/register" style="color:#1a73e8; font-weight:600;">Register here</a>
        </p>
    </div>
</div>
</body>
</html>
