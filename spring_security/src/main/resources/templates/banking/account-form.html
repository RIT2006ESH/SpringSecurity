<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account | SecureBank</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
        🏦 <span>SecureBank</span>
    </a>
    <div class="navbar-links">
        <a href="/banking/customers">Customers</a>
        <a href="/banking/accounts">Accounts</a>
        <a href="/banking/transactions">Transactions</a>
        <a href="/logout" style="color:#ea4335;">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="page-header">
        <div>
            <h2>➕ Add Account</h2>
            <p>Create a new bank account</p>
        </div>
        <div class="page-header-actions">
            <a href="/banking/accounts" class="btn btn-secondary">
                ← Back to Accounts
            </a>
        </div>
    </div>

    <div class="card" style="max-width: 560px;">
        <form th:action="@{/banking/accounts/save}"
              th:object="${account}"
              method="post">

            <div class="form-group">
                <label>Customer ID</label>
                <input type="number" th:field="*{customerId}"
                       placeholder="Enter customer ID" required/>
            </div>

            <div class="form-group">
                <label>Account Type</label>
                <select th:field="*{accountType}">
                    <option value="Savings">Savings</option>
                    <option value="Current">Current</option>
                </select>
            </div>

            <div class="form-group">
                <label>Initial Balance (₹)</label>
                <input type="number" th:field="*{balance}"
                       placeholder="Enter initial balance"
                       step="0.01" min="0" required/>
            </div>

            <div class="form-group">
                <label>Branch ID</label>
                <input type="number" th:field="*{branchId}"
                       placeholder="Enter branch ID"/>
            </div>

            <div style="display:flex; gap:12px; margin-top:8px;">
                <button type="submit" class="btn btn-primary">
                    💾 Save Account
                </button>
                <a href="/banking/accounts" class="btn btn-secondary">
                    Cancel
                </a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
