<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts | SecureBank</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
        🏦 <span>SecureBank</span>
    </a>
    <div class="navbar-links">
        <a href="/banking/customers">Customers</a>
        <a href="/banking/accounts">Accounts</a>
        <a href="/banking/transactions">Transactions</a>
        <a href="/logout" style="color:#ea4335;">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="page-header">
        <div>
            <h2>🏦 Accounts</h2>
            <p>Manage all bank accounts</p>
        </div>
        <div class="page-header-actions">
            <a href="/banking/accounts/new" class="btn btn-primary">
                + Add Account
            </a>
            <a href="/dashboard" class="btn btn-secondary">
                ← Dashboard
            </a>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Account Number</th>
                <th>Customer ID</th>
                <th>Type</th>
                <th>Balance</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="account : ${accounts}">
                <td>
                    <strong th:text="${account.accountNumber}"></strong>
                </td>
                <td th:text="${account.customerId}"></td>
                <td>
                        <span class="badge badge-info"
                              th:text="${account.accountType}"></span>
                </td>
                <td>
                    <strong style="color:#137333;">
                        ₹<span th:text="${account.balance}"></span>
                    </strong>
                </td>
                <td>
                    <div style="display:flex; gap:8px;">
                        <a th:href="@{/banking/accounts/{id}(id=${account.accountNumber})}"
                           class="btn btn-secondary btn-sm">View</a>
                        <a th:href="@{/banking/accounts/delete/{id}(id=${account.accountNumber})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this account?')">Delete</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(accounts)}">
                <td colspan="5" style="text-align:center; color:#5f6368; padding:32px;">
                    No accounts found.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
