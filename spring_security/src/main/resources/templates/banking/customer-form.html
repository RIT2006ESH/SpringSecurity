<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Customer | SecureBank</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="/dashboard" class="navbar-brand">
        🏦 <span>SecureBank</span>
    </a>
    <div class="navbar-links">
        <a href="/banking/customers">Customers</a>
        <a href="/banking/accounts">Accounts</a>
        <a href="/banking/transactions">Transactions</a>
        <a href="/logout" style="color:#ea4335;">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="page-header">
        <div>
            <h2>➕ Add Customer</h2>
            <p>Register a new bank customer</p>
        </div>
        <div class="page-header-actions">
            <a href="/banking/customers" class="btn btn-secondary">
                ← Back to Customers
            </a>
        </div>
    </div>

    <div class="card" style="max-width: 640px;">
        <form th:action="@{/banking/customers/save}"
              th:object="${customer}"
              method="post">

            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" th:field="*{firstName}"
                           placeholder="Enter first name" required/>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" th:field="*{lastName}"
                           placeholder="Enter last name" required/>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}"
                       placeholder="Enter email address" required/>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" th:field="*{phone}"
                       placeholder="Enter 10 digit phone number" required/>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" th:field="*{dob}"/>
            </div>

            <div style="display:flex; gap:12px; margin-top:8px;">
                <button type="submit" class="btn btn-primary">
                    💾 Save Customer
                </button>
                <a href="/banking/customers" class="btn btn-secondary">
                    Cancel
                </a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
