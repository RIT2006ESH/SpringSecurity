<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SecureBank</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-logo">
            <h1>🏦 SecureBank</h1>
            <p>Create your account</p>
        </div>

        <h2>Get started</h2>
        <p class="subtitle">Fill in your details to register</p>

        <div th:if="${errorMessage}" class="alert alert-error">
            ⚠️ <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/register}" th:object="${registrationRequest}" method="post">

            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" th:field="*{firstName}"
                           placeholder="First name" required/>
                    <span th:if="${#fields.hasErrors('firstName')}"
                          th:errors="*{firstName}"
                          style="color:#ea4335; font-size:12px;"></span>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" th:field="*{lastName}"
                           placeholder="Last name" required/>
                    <span th:if="${#fields.hasErrors('lastName')}"
                          th:errors="*{lastName}"
                          style="color:#ea4335; font-size:12px;"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}"
                       placeholder="Enter your email" required/>
                <span th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}"
                      style="color:#ea4335; font-size:12px;"></span>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" th:field="*{phone}"
                       placeholder="10 digit phone number" required/>
                <span th:if="${#fields.hasErrors('phone')}"
                      th:errors="*{phone}"
                      style="color:#ea4335; font-size:12px;"></span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}"
                           placeholder="Create password" required/>
                    <span th:if="${#fields.hasErrors('password')}"
                          th:errors="*{password}"
                          style="color:#ea4335; font-size:12px;"></span>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" th:field="*{confirmPassword}"
                           placeholder="Confirm password" required/>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                Create Account →
            </button>
        </form>

        <p style="text-align:center; margin-top:24px; font-size:14px; color:#5f6368;">
            Already have an account?
            <a href="/login" style="color:#1a73e8; font-weight:600;">Sign in here</a>
        </p>
    </div>
</div>
</body>
</html>
