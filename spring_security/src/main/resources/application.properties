spring.application.name=spring_security

# --- Primary DB (Auth/Registration) ---
spring.datasource.primary.jdbc-url=${PRIMARY_DB_URL}
spring.datasource.primary.username=${PRIMARY_DB_USERNAME}
spring.datasource.primary.password=${PRIMARY_DB_PASSWORD}
spring.datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Secondary DB (Banking) ---
spring.datasource.banking.jdbc-url=${BANKING_DB_URL}
spring.datasource.banking.username=${BANKING_DB_USERNAME}
spring.datasource.banking.password=${BANKING_DB_PASSWORD}
spring.datasource.banking.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.default-encoding=UTF-8

# Twilio
twilio.account.sid=${TWILIO_ACCOUNT_SID:ACxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
twilio.auth.token=${TWILIO_AUTH_TOKEN:xxxxxxxxxxxxxxxxxxxxxxxx}
twilio.phone.number=${TWILIO_PHONE_NUMBER:your_twilio_phone}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Storage
file.upload.dir=uploads/kyc
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Document Encryption (RSA hybrid) - for the new document storage feature
document.encryption.rsa-public-key=${DOC_RSA_PUBLIC_KEY:}
document.encryption.rsa-private-key=${DOC_RSA_PRIVATE_KEY:}